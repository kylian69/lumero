# Cloudflare Tunnel configuration for lumero.fr
# Generated by: cloudflared tunnel create lume
#
# TUNNEL_ID and credentials.json are created by running scripts/setup-tunnel.sh
# on the production VM. Never commit credentials.json to git.

tunnel: TUNNEL_ID_PLACEHOLDER
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # Main app
  - hostname: lumero.fr
    service: http://app:3000
    originRequest:
      httpHostHeader: lumero.fr

  - hostname: www.lumero.fr
    service: http://app:3000
    originRequest:
      httpHostHeader: lumero.fr

  # Deploy webhook (signed HMAC — do not add Cloudflare Access here)
  - hostname: deploy.lumero.fr
    service: http://deploy-agent:9000
    originRequest:
      httpHostHeader: deploy.lumero.fr

  # Preview clients (wildcard — routes to future preview-orchestrator)
  - hostname: "*.preview.lumero.fr"
    service: http://preview-orchestrator:8080
    originRequest:
      httpHostHeader: preview.lumero.fr

  # Catch-all (required by cloudflared)
  - service: http_status:404
