server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Découverte automatique de tous les conteneurs Docker via le socket.
  # Chaque ligne stdout/stderr est expédiée à Loki, étiquetée par conteneur.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
    pipeline_stages:
      # Les logs applicatifs Lumero sont en JSON structuré : on en extrait le
      # niveau et le message pour pouvoir filtrer/agréger dans Grafana. Les
      # logs non-JSON (postgres, cloudflared…) passent tels quels.
      - json:
          expressions:
            level: level
            msg: msg
            ts: ts
      - labels:
          level:
      - timestamp:
          source: ts
          format: RFC3339Nano
          action_on_failure: skip
