# Locally-managed cloudflared config for the STAGING tunnel.
#
# Used instead of a dashboard-managed (token) tunnel so we can declare a
# hostname-less catch-all ingress rule — required because the per-preview
# hostnames are created dynamically (by the orchestrator's DNS automation) and
# can't be pre-declared as dashboard Public Hostnames. The staging tunnel can't
# reuse the *.lumero.fr wildcard either (production owns it).
#
# The tunnel UUID is passed on the command line (TUNNEL_ID env). The credentials
# JSON is mounted at the path below (see docker-compose.staging.yml).
#
# Order matters: specific hostnames first, catch-all last.
#
# IMPORTANT — actual routing is dashboard-managed. In practice this tunnel
# receives a remotely-managed configuration from the Cloudflare dashboard
# (cloudflared logs "Updated to new configuration version=N"), which OVERRIDES
# the ingress declared here. Single-hostname routes (e.g. Grafana on
# logs-dev.lumero.fr → grafana:3000) must therefore be added as Public
# Hostnames in the dashboard, not here. This file is kept as reference / fallback.

credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: dev.lumero.fr
    service: http://app:3000
  - hostname: staging-webhook.lumero.fr
    service: http://deploy-agent:9000
  - hostname: preview-webhook-dev.lumero.fr
    service: http://preview-orchestrator:8080
  # Catch-all: every dynamically-created preview hostname (slug-id6-preview-dev
  # .lumero.fr) lands here. The orchestrator dispatches by Host header to the
  # matching preview container.
  - service: http://preview-orchestrator:8080
