# Production compose for Lume.
# - App image is pulled from GHCR (tag pinned via IMAGE env var or :latest by default).
# - Postgres runs on the same VM with a persistent named volume.
# - deploy-agent listens for signed webhooks from GitHub Actions and triggers
#   `docker compose pull && up -d` when a new image is published.
# - cloudflared creates outbound tunnels to Cloudflare for TLS + DDoS protection
#   without exposing any port on the host.
#
# All secrets are read from the .env file on the host (see .env.prod.example).

services:
  postgres:
    image: postgres:17-alpine
    container_name: lume-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?missing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_DB: ${POSTGRES_DB:?missing}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:17-alpine
    container_name: lume-postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:?missing}
      POSTGRES_USER: ${POSTGRES_USER:?missing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_EXTRA_OPTS: "-Z6 --schema=public --blobs"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - postgres-backups:/backups
    networks:
      - lume
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  app:
    image: ${IMAGE:-ghcr.io/kylian69/lumero:latest}
    container_name: lume-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lume
    # No host port exposed: cloudflared reaches the app via the internal
    # docker network (service name "app" on port 3000).
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  deploy-agent:
    build:
      context: .
      dockerfile: docker/deploy-agent.Dockerfile
    image: lume-deploy-agent:local
    container_name: lume-deploy-agent
    restart: unless-stopped
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?missing}
      COMPOSE_PROJECT_DIR: /workspace
      # Must match the project name used when the stack was brought up on the
      # host (default = host directory name, "lumero"). Without this, compose
      # inside the agent defaults to "workspace" (its cwd), doesn't see the
      # running lume-app, and `up --force-recreate app` collides on the fixed
      # container_name instead of replacing it -> deploys silently no-op.
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-lumero}
      # Optional: if both are set, deploy.sh purges the Cloudflare edge cache
      # at the end of each deploy so visitors aren't served stale HTML.
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
      # Optional: if set, deploy.sh posts deploy lifecycle notifications
      # (start / done / failed) to this Discord webhook.
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/webhook/hooks.yaml:/etc/webhook/hooks.yaml:ro
      - ./scripts/deploy.sh:/scripts/deploy.sh:ro
      - .:/workspace
    networks:
      - lume
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: lume-cloudflared
    restart: unless-stopped
    # Force HTTP/2 instead of QUIC. UDP/QUIC is unreliable on some mobile
    # carriers and home ISPs, causing random 502s depending on which CF edge
    # the visitor's device hits. HTTP/2 is rock-solid and the perf diff is
    # imperceptible for our use case.
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?missing}
    networks:
      - lume
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: lume-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lume
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  preview-orchestrator:
    build:
      context: services/preview-orchestrator
      dockerfile: Dockerfile
    image: lume-preview-orchestrator:local
    container_name: lume-preview-orchestrator
    restart: unless-stopped
    environment:
      INTERNAL_API_TOKEN: ${PREVIEW_INTERNAL_API_TOKEN:?missing}
      GITHUB_WEBHOOK_SECRET: ${PREVIEW_GITHUB_WEBHOOK_SECRET:?missing}
      GITHUB_TOKEN: ${GITHUB_TOKEN:?missing}
      PREVIEW_BASE_DOMAIN: lumero.fr
      PREVIEW_NETWORK: lumero_lume
      IDLE_SHUTDOWN_DAYS: 3
      # Used to authorize preview visitors against the main app.
      MAIN_APP_INTERNAL_URL: http://app:3000
      MAIN_APP_PUBLIC_URL: https://lumero.fr
      # Active la purge planifiée des journaux (appel à /api/cron/purge-logs).
      # Doit être identique au CRON_SECRET de l'app (.env).
      CRON_SECRET: ${CRON_SECRET:-}
    volumes:
      - preview-orchestrator-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lume
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Observabilité : logs centralisés et consultables hors de l'app ───────
  # Stack Loki + Promtail + Grafana, souveraine et gratuite. Promtail collecte
  # le stdout de TOUS les conteneurs via le socket Docker et l'envoie à Loki ;
  # Grafana fournit une UI d'analyse indépendante de l'application — donc
  # consultable même si l'app et/ou Postgres sont à terre.
  loki:
    image: grafana/loki:3.2.0
    container_name: lume-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - lume
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  promtail:
    image: grafana/promtail:3.2.0
    container_name: lume-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-data:/tmp
    networks:
      - lume
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: lume-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?missing}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    # Lié à la loopback de l'hôte uniquement : accès via tunnel SSH
    #   ssh -L 3001:127.0.0.1:3001 user@serveur  →  http://localhost:3001
    # Indépendant de Cloudflare/app, donc joignable même en cas de panne.
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - lume
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  lume:
    driver: bridge

volumes:
  postgres-data:
  postgres-backups:
  uptime-kuma-data:
  preview-orchestrator-data:
  loki-data:
  promtail-data:
  grafana-data:
