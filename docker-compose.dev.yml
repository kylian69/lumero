services:
  postgres:
    image: postgres:17-alpine
    container_name: lume-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: lume
      POSTGRES_PASSWORD: lume
      POSTGRES_DB: lume
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lume -d lume"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
