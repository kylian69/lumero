name: Build & Push Docker image (staging)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute application version
        id: version
        run: |
          set -euo pipefail
          # The version is derived from the develop branch, so make sure its
          # remote-tracking ref exists even when building another branch.
          git fetch --no-tags origin develop:refs/remotes/origin/develop || true
          # Make sure all existing semver tags are present so the rc.N counter
          # picks up previous staging builds.
          git fetch --tags --force origin || true
          OUT=$(node scripts/compute-version.mjs --channel=staging)
          echo "version=$(echo "$OUT" | jq -r .version)" >> "$GITHUB_OUTPUT"
          echo "commit=$(echo "$OUT"  | jq -r .commit)"  >> "$GITHUB_OUTPUT"
          echo "date=$(echo "$OUT"    | jq -r .date)"    >> "$GITHUB_OUTPUT"
          echo "channel=$(echo "$OUT" | jq -r .channel)" >> "$GITHUB_OUTPUT"

      - name: Notify Discord (build started)
        if: vars.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          SHORT_SHA="${COMMIT_SHA:0:7}"
          FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -n1)
          PAYLOAD=$(jq -nc \
            --arg sha "$SHORT_SHA" \
            --arg author "$COMMIT_AUTHOR" \
            --arg msg "$FIRST_LINE" \
            --arg url "$RUN_URL" \
            '{embeds:[{title:"🧪 Build staging en cours",description:("Commit `"+$sha+"` par **"+$author+"**\n"+$msg),url:$url,color:10181046}]}')
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            APP_COMMIT=${{ steps.version.outputs.commit }}
            APP_BUILD_DATE=${{ steps.version.outputs.date }}
            APP_CHANNEL=staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag commit with pre-release version
        if: success()
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Staging release $TAG"
          git push origin "$TAG"

      - name: Trigger staging deploy webhook
        if: vars.STAGING_DEPLOY_WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ vars.STAGING_DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.STAGING_DEPLOY_WEBHOOK_SECRET }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        run: |
          set -euo pipefail
          PAYLOAD=$(printf '{"image":"%s"}' "$IMAGE")
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')
          echo "Posting staging deploy webhook for image: $IMAGE"
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD"

      - name: Notify Discord (build failed)
        if: failure() && vars.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          SHORT_SHA="${COMMIT_SHA:0:7}"
          PAYLOAD=$(jq -nc \
            --arg sha "$SHORT_SHA" \
            --arg url "$RUN_URL" \
            '{embeds:[{title:"❌ Build staging échoué",description:("Commit `"+$sha+"` — le build ou le webhook a échoué."),url:$url,color:15158332}]}')
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
